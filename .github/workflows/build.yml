on:
  push:
    branches: [main]
  pull_request:
name: CI
jobs:
  flatpak:
    name: "Flatpak"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/kde:6.10 #CHORE: update whenever SDK updates in upstream manifest
      options: --privileged
    strategy:
      matrix:
        arch: [x86_64]
      fail-fast: false
      # Only one job at a time can use the shared repository cache
      max-parallel: 1
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ secrets.GPG_KEY }}

    - name: CNAME
      run: |
        echo fnordmc.xyz > CNAME
  
    - name: Build flatpak
      uses: andyholmes/flatter@ff4ae4551df8167c4dabfb779e22e55d50652066
      with:
        files: |
            xyz.fnordmc.FnordLauncher.yml
        arch: ${{ matrix.arch }}
        upload-bundles: true
        upload-pages-artifact: true
        upload-pages-includes: |
          CNAME
        gpg-sign: ${{ secrets.GPG_KEY_ID }}
        flatpak-builder-args: |
          --install-deps-from=flathub

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: flatpak
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
